<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GalaxyMusic</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000005; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="loader" style="
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:#000005;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:system-ui,-apple-system,sans-serif;color:rgba(255,255,255,0.6);
    ">
      <div style="font-size:14px;letter-spacing:4px;margin-bottom:24px;">SOLAR ENGINE LOADING</div>
      <div style="width:200px;height:2px;background:rgba(255,255,255,0.1);border-radius:1px;overflow:hidden;">
        <div id="loader-bar" style="width:0%;height:100%;background:rgba(255,255,255,0.4);transition:width 0.3s;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
