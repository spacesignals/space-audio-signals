<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>spacesignals — Mission Console</title>
<style>
  :root {
    --bg: #030507;
    --line: rgba(120, 220, 200, 0.16);
    --line-strong: rgba(120, 220, 200, 0.4);
    --text: rgba(210, 240, 232, 0.92);
    --dim: rgba(210, 240, 232, 0.4);
    --accent: #64e0c8;
    --warn: #e8c064;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Mono", Consolas, monospace;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: var(--mono); color: var(--text); font-size: 12px; }
  canvas#stars { position: fixed; inset: 0; }

  /* faint grid overlay */
  .grid-overlay {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.5;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 160px 160px;
    mask-image: radial-gradient(ellipse at center, transparent 30%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse at center, transparent 30%, black 100%);
  }

  /* center reticle */
  .reticle {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 56px; height: 56px; pointer-events: none; opacity: 0.55;
  }
  .reticle::before, .reticle::after { content: ''; position: absolute; background: var(--line-strong); }
  .reticle::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-0.5px); }
  .reticle::after { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-0.5px); }
  .reticle .c { position: absolute; inset: 18px; border: 1px solid var(--line-strong); border-radius: 50%; }

  /* corner-bracket panel */
  .panel {
    position: fixed; background: rgba(4, 10, 12, 0.68);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    padding: 14px 16px;
  }
  .panel .bracket { position: absolute; width: 10px; height: 10px; border-color: var(--accent); border-style: solid; opacity: 0.8; }
  .panel .tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .panel .tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
  .panel .bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
  .panel .br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .panel h4 {
    font-size: 10px; font-weight: 400; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .panel h4::before { content: '// '; color: var(--accent); }

  /* ---------- left: body registry ---------- */
  .registry { top: 20px; left: 20px; width: 240px; max-height: calc(100vh - 180px); display: flex; flex-direction: column; }
  .registry .list { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line) transparent; margin: 0 -6px; padding: 0 6px; }
  .row {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 5px 6px; border: none; background: none; cursor: pointer;
    color: var(--dim); font-family: var(--mono); font-size: 11px;
    border-left: 2px solid transparent;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
    text-align: left;
  }
  .row:hover { color: var(--text); background: rgba(100, 224, 200, 0.05); }
  .row.active { color: var(--accent); border-left-color: var(--accent); background: rgba(100, 224, 200, 0.07); }
  .row .idx { opacity: 0.4; width: 22px; }
  .row .nm { flex: 1; letter-spacing: 1px; text-transform: uppercase; }
  .row .rng { font-size: 10px; opacity: 0.65; font-variant-numeric: tabular-nums; }
  .row .sig { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0; transition: opacity 0.2s; }
  .row.audible .sig { opacity: 1; animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }

  /* ---------- bottom telemetry bar ---------- */
  .telebar {
    bottom: 20px; left: 20px; right: 20px;
    display: flex; align-items: center; gap: 26px; padding: 12px 20px;
    flex-wrap: wrap; row-gap: 10px;
  }
  @media (max-width: 760px) { .telebar { gap: 16px; } .telebar .vsep { display: none; } }
  .tele-group { display: flex; flex-direction: column; gap: 2px; }
  .tele-group .k { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  .tele-group .v { font-size: 15px; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
  .tele-group .v .unit { font-size: 10px; color: var(--dim); }
  .vsep { width: 1px; align-self: stretch; background: var(--line); }
  .throttle { flex: 1; display: flex; align-items: center; gap: 14px; min-width: 200px; }
  .throttle .k { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  .throttle input {
    -webkit-appearance: none; flex: 1; height: 14px; background: transparent; cursor: pointer; outline: none;
  }
  .throttle input::-webkit-slider-runnable-track {
    height: 14px;
    background:
      repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 10%) 0 0 / 100% 100%,
      linear-gradient(var(--line) 0 0) 0 50% / 100% 1px no-repeat;
  }
  .throttle input::-webkit-slider-thumb {
    -webkit-appearance: none; width: 4px; height: 14px; background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .btn {
    background: none; border: 1px solid var(--line); color: var(--dim);
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { color: var(--accent); border-color: var(--line-strong); box-shadow: inset 0 0 14px rgba(100, 224, 200, 0.07); }
  .btn.on { color: var(--accent); border-color: var(--accent); }

  /* ---------- right: systems panel ---------- */
  .systems { top: 20px; right: 20px; width: 220px; }
  .sys-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 11px; }
  .sys-row .k { color: var(--dim); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
  .meter { display: flex; gap: 3px; }
  .meter i { width: 8px; height: 10px; background: var(--line); transition: background 0.15s; }
  .meter i.lit { background: var(--accent); box-shadow: 0 0 6px rgba(100, 224, 200, 0.5); }
  .toggle {
    width: 30px; height: 14px; border: 1px solid var(--line-strong); position: relative; cursor: pointer;
  }
  .toggle i { position: absolute; top: 2px; left: 2px; width: 9px; height: 8px; background: var(--dim); transition: all 0.2s var(--ease); }
  .toggle.on i { left: 17px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* target readout under reticle */
  .target-ro {
    position: fixed; top: calc(50% + 44px); left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.4s;
    font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase;
  }
  .target-ro.show { opacity: 0.9; }
  .target-ro .d { color: var(--dim); margin-top: 3px; letter-spacing: 1px; }

  /* log ticker */
  .log {
    position: fixed; bottom: 78px; left: 20px; width: 240px; pointer-events: none;
    font-size: 10px; color: var(--dim); line-height: 1.8; letter-spacing: 0.5px;
    mask-image: linear-gradient(transparent, black 40%);
    -webkit-mask-image: linear-gradient(transparent, black 40%);
  }
  .log div b { color: var(--accent); font-weight: 400; }

  /* ---------- start overlay ---------- */
  .start {
    position: fixed; inset: 0; z-index: 50; background: var(--bg);
    display: grid; place-items: center; cursor: pointer;
    transition: opacity 0.8s var(--ease), visibility 0.8s;
  }
  .start.gone { opacity: 0; visibility: hidden; }
  .start .box { text-align: center; }
  .start h1 { font-size: 20px; font-weight: 400; letter-spacing: 12px; margin: 22px 0 8px; }
  .start .sub { color: var(--dim); font-size: 10px; letter-spacing: 3px; }
  .start .boot { margin-top: 40px; font-size: 10px; color: var(--dim); text-align: left; width: 300px; line-height: 2; }
  .start .boot .ok { color: var(--accent); }
  .start .press { margin-top: 26px; font-size: 11px; letter-spacing: 4px; color: var(--warn); animation: blink 1.8s infinite; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="grid-overlay"></div>
<div class="reticle"><div class="c"></div></div>
<div class="target-ro" id="target-ro"><div id="tname">MERCURY</div><div class="d" id="tdist">RANGE 312.4M KM</div></div>

<div class="start" id="start">
  <div class="box">
    <svg width="54" height="54" viewBox="0 0 54 54" fill="none" stroke="#64e0c8" stroke-width="1">
      <circle cx="27" cy="27" r="25" opacity="0.3"/><circle cx="27" cy="27" r="17" opacity="0.55"/>
      <circle cx="27" cy="27" r="5" fill="#64e0c8" stroke="none" opacity="0.9"/>
      <circle cx="44" cy="27" r="2" fill="#64e0c8" stroke="none"/>
    </svg>
    <h1>SPACESIGNALS</h1>
    <div class="sub">ORBITAL AUDIO CONSOLE — v2.0</div>
    <div class="boot" id="boot"></div>
    <div class="press" id="press" style="visibility:hidden">▸ CLICK TO INITIALIZE AUDIO</div>
  </div>
</div>

<div class="panel registry">
  <span class="bracket tl"></span><span class="bracket tr"></span><span class="bracket bl"></span><span class="bracket br"></span>
  <h4>Body Registry</h4>
  <div class="list" id="list"></div>
</div>

<div class="panel systems">
  <span class="bracket tl"></span><span class="bracket tr"></span><span class="bracket bl"></span><span class="bracket br"></span>
  <h4>Systems</h4>
  <div class="sys-row"><span class="k">Master Vol</span><div class="meter" id="vol-meter"></div></div>
  <div class="sys-row"><span class="k">Bloom</span><div class="meter" id="bloom-meter"></div></div>
  <div class="sys-row"><span class="k">Labels</span><div class="toggle" id="tg-labels"><i></i></div></div>
  <div class="sys-row"><span class="k">BG Audio</span><div class="toggle on" id="tg-bg"><i></i></div></div>
  <div class="sys-row"><span class="k">Stems Active</span><span id="stems" style="font-variant-numeric:tabular-nums">0 / 24</span></div>
</div>

<div class="log" id="log"></div>

<div class="panel telebar">
  <span class="bracket tl"></span><span class="bracket tr"></span><span class="bracket bl"></span><span class="bracket br"></span>
  <div class="tele-group"><span class="k">Nearest</span><span class="v" id="near">DEEP SPACE</span></div>
  <div class="vsep"></div>
  <div class="tele-group"><span class="k">Range</span><span class="v" id="range">— <span class="unit">km</span></span></div>
  <div class="vsep"></div>
  <div class="throttle">
    <span class="k">Throttle</span>
    <input type="range" id="speed" min="0" max="100" value="55">
    <div class="tele-group"><span class="v" id="spd" style="font-size:12px">15.0 <span class="unit">AU/min</span></span></div>
  </div>
  <div class="vsep"></div>
  <button class="btn" id="tour">Tour</button>
  <button class="btn" id="top">Top View</button>
</div>

<script>
/* ---------- starfield ---------- */
const cvs = document.getElementById('stars'), ctx = cvs.getContext('2d');
let W, H, stars = [];
function resize() {
  W = cvs.width = innerWidth * devicePixelRatio;
  H = cvs.height = innerHeight * devicePixelRatio;
  cvs.style.width = innerWidth + 'px'; cvs.style.height = innerHeight + 'px';
  stars = Array.from({ length: 380 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    z: 0.2 + Math.random() * 0.8, tw: Math.random() * 7,
  }));
}
addEventListener('resize', resize); resize();
let t0 = 0;
function frame(t) {
  const dt = Math.min(t - t0, 50); t0 = t;
  ctx.fillStyle = '#030507'; ctx.fillRect(0, 0, W, H);
  for (const s of stars) {
    s.x -= 0.05 * s.z * dt * devicePixelRatio;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    s.tw += 0.002 * dt;
    ctx.fillStyle = `rgba(190,235,225,${0.25 + 0.45 * s.z + 0.2 * Math.sin(s.tw)})`;
    ctx.fillRect(s.x, s.y, s.z * 1.3 * devicePixelRatio, s.z * 1.3 * devicePixelRatio);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- registry ---------- */
const BODIES = [
  'Sun','Mercury','Venus','Earth','Moon','Mars','Ceres','Vesta','Jupiter','Io','Europa',
  'Ganymede','Callisto','Saturn','Titan','Enceladus','Rhea','Uranus','Neptune','Triton','Pluto','Charon',
];
const list = document.getElementById('list');
const rows = [];
let active = null;
BODIES.forEach((name, i) => {
  const r = document.createElement('button');
  r.className = 'row';
  const rng = (Math.random() * 30 + 0.4);
  r.dataset.range = rng;
  r.innerHTML = `<span class="idx">${String(i + 1).padStart(2, '0')}</span><span class="nm">${name}</span><span class="rng">${rng.toFixed(1)} AU</span><span class="sig"></span>`;
  if (rng < 4) r.classList.add('audible');
  r.onclick = () => {
    active?.classList.remove('active');
    r.classList.add('active'); active = r;
    flyTo(name);
  };
  list.appendChild(r); rows.push(r);
});

/* ---------- meters ---------- */
function buildMeter(id, initial, max, onChange) {
  const el = document.getElementById(id);
  const cells = [];
  for (let i = 0; i < 10; i++) {
    const c = document.createElement('i');
    c.onclick = () => set(i + 1);
    el.appendChild(c); cells.push(c);
  }
  function set(n) {
    cells.forEach((c, i) => c.classList.toggle('lit', i < n));
    onChange?.(n / 10 * max);
  }
  set(initial);
  el.style.cursor = 'pointer';
}
buildMeter('vol-meter', 8, 1);
buildMeter('bloom-meter', 5, 2);

document.querySelectorAll('.toggle').forEach(t => t.onclick = () => t.classList.toggle('on'));

/* ---------- travel sim + log ---------- */
const near = document.getElementById('near'), range = document.getElementById('range');
const tro = document.getElementById('target-ro'), tname = document.getElementById('tname'), tdist = document.getElementById('tdist');
const logEl = document.getElementById('log'), stemsEl = document.getElementById('stems');
let target = null, dist = 0, troTimer;
function log(msg) {
  const d = document.createElement('div');
  d.innerHTML = msg;
  logEl.appendChild(d);
  while (logEl.children.length > 5) logEl.firstChild.remove();
}
function flyTo(name) {
  target = name; dist = 1.5e8 + Math.random() * 5e8;
  tname.textContent = name.toUpperCase();
  tro.classList.add('show');
  clearTimeout(troTimer);
  troTimer = setTimeout(() => tro.classList.remove('show'), 3500);
  log(`&gt; nav.flyTo(<b>${name.toLowerCase()}</b>) — trajectory locked`);
}
function fmt(km) {
  if (km > 1e9) return (km / 1.496e8).toFixed(2) + ' AU';
  if (km > 1e6) return (km / 1e6).toFixed(1) + 'M km';
  return Math.round(km).toLocaleString() + ' km';
}
setInterval(() => {
  if (!target) return;
  dist = Math.max(dist * 0.962, 6e5);
  near.textContent = target.toUpperCase();
  range.innerHTML = fmt(dist);
  tdist.textContent = 'RANGE ' + fmt(dist).toUpperCase();
  const n = Math.min(24, Math.max(0, Math.round(10 - Math.log10(dist))));
  stemsEl.textContent = `${n} / 24`;
}, 100);

/* ---------- throttle ---------- */
const speed = document.getElementById('speed'), spd = document.getElementById('spd');
speed.oninput = () => {
  const s = 0.01 * Math.pow(500 / 0.01, speed.value / 100);
  spd.innerHTML = s > 2
    ? (s * 0.4).toFixed(1) + ' <span class="unit">AU/min</span>'
    : (s * 1000).toFixed(0) + 'k <span class="unit">km/s</span>';
};
document.getElementById('tour').onclick = function () { log('&gt; tour.start() — <b>10 waypoints</b> queued'); };
document.getElementById('top').onclick = function () { log('&gt; nav.topView() — ascending to <b>6000u</b>'); };

/* ---------- boot sequence ---------- */
const bootLines = [
  ['renderer', 'WebGL2 · ACES tone mapping'],
  ['ephemeris', 'astronomy-engine · 24 bodies'],
  ['textures', '31 / 31 loaded · 2K'],
  ['audio', 'ctx suspended — awaiting gesture'],
];
const boot = document.getElementById('boot'), press = document.getElementById('press');
let li = 0;
const bootIv = setInterval(() => {
  if (li >= bootLines.length) {
    clearInterval(bootIv);
    press.style.visibility = 'visible';
    return;
  }
  const [k, v] = bootLines[li++];
  boot.innerHTML += `<div><span class="ok">[ OK ]</span> ${k.padEnd(10, ' ')} ${v}</div>`;
}, 380);

document.getElementById('start').onclick = function () {
  this.classList.add('gone');
  log('&gt; audio.init() — context <b>running</b>');
  log('&gt; drone online — deep space ambient at <b>30%</b>');
};
</script>
</body>
</html>
